name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-intel
            runner: macos-15-intel
            artifact_name: CC-Video-Repair-macOS-Intel-dmg
            dmg_volume_name: CC Video Repair Intel
            dmg_name: CC-Video-Repair-macOS-Intel.dmg
            pyinstaller_args: --windowed --target-arch x86_64
          - os: macos-apple-silicon
            runner: macos-latest
            artifact_name: CC-Video-Repair-macOS-Apple-Silicon-dmg
            dmg_volume_name: CC Video Repair Apple Silicon
            dmg_name: CC-Video-Repair-macOS-Apple-Silicon.dmg
            pyinstaller_args: --windowed --target-arch arm64
          - os: windows
            runner: windows-latest
            artifact_name: CC-Video-Repair-Windows-x64-installer
            pyinstaller_args: --windowed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} --name "CC Video Repair" --paths src src/cc_video_repair/app.py

      - name: Create macOS DMG
        if: startsWith(matrix.os, 'macos')
        run: |
          set -euo pipefail
          mkdir -p release
          dmg_root="$(mktemp -d "${RUNNER_TEMP:-/tmp}/cc-video-repair-dmg.XXXXXX")"
          cp -R "dist/CC Video Repair.app" "$dmg_root/"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil detach "/Volumes/${{ matrix.dmg_volume_name }}" -force || true
          sync

          for attempt in 1 2 3; do
            if hdiutil create \
              -volname "${{ matrix.dmg_volume_name }}" \
              -srcfolder "$dmg_root" \
              -ov \
              -format UDZO \
              "release/${{ matrix.dmg_name }}"; then
              break
            fi

            if [ "$attempt" = "3" ]; then
              exit 1
            fi

            sleep 5
            hdiutil detach "/Volumes/${{ matrix.dmg_volume_name }}" -force || true
          done

      - name: Install Inno Setup
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/windows/cc-video-repair.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
