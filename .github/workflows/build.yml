name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-intel
            runner: macos-15-intel
            python_source: pythonorg
            python_version: "3.10.11"
            python_bin: /Library/Frameworks/Python.framework/Versions/3.10/bin/python3
            artifact_name: CC-Decrypter-macOS-Intel-dmg
            dmg_volume_name: CC Decrypter Intel
            dmg_name: CC-Decrypter-macOS-Intel.dmg
            pyinstaller_name: CC-Decrypter
            pyinstaller_args: --windowed --target-arch x86_64 --icon assets/CCD.icns --osx-bundle-identifier com.xorica.ccdecrypter
          - os: macos-apple-silicon
            runner: macos-latest
            python_source: setup-python
            python_version: "3.12"
            python_bin: python
            artifact_name: CC-Decrypter-macOS-Apple-Silicon-dmg
            dmg_volume_name: CC Decrypter Apple Silicon
            dmg_name: CC-Decrypter-macOS-Apple-Silicon.dmg
            pyinstaller_name: CC-Decrypter
            pyinstaller_args: --windowed --target-arch arm64 --icon assets/CCD.icns --osx-bundle-identifier com.xorica.ccdecrypter
          - os: windows
            runner: windows-latest
            python_source: setup-python
            python_version: "3.12"
            python_bin: python
            artifact_name: CC-Decrypter-Windows-x64-installer
            pyinstaller_name: CC Decrypter
            pyinstaller_args: --windowed --icon assets/CCD.ico

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.python_source == 'setup-python'
        with:
          python-version: ${{ matrix.python_version }}
          cache: "pip"

      - name: Install python.org runtime
        if: matrix.python_source == 'pythonorg'
        run: |
          set -euo pipefail
          curl -L -o "${RUNNER_TEMP}/python-${{ matrix.python_version }}-macos11.pkg" \
            "https://www.python.org/ftp/python/${{ matrix.python_version }}/python-${{ matrix.python_version }}-macos11.pkg"
          sudo installer -pkg "${RUNNER_TEMP}/python-${{ matrix.python_version }}-macos11.pkg" -target /
          "${{ matrix.python_bin }}" --version

      - name: Install dependencies
        run: |
          ${{ matrix.python_bin }} -m pip install --upgrade pip
          ${{ matrix.python_bin }} -m pip install -r requirements.txt

      - name: Install DMGForge
        if: startsWith(matrix.os, 'macos')
        run: |
          set -euo pipefail
          dmgforge_dir="${RUNNER_TEMP}/DMGForge"
          git clone --depth 1 https://github.com/xorica27/DMGForge.git "$dmgforge_dir"
          "$dmgforge_dir/scripts/build.sh" --skip-tests --arch "$(uname -m)"
          echo "$dmgforge_dir/dist/DMGForge.app/Contents/MacOS" >> "$GITHUB_PATH"
          "$dmgforge_dir/dist/DMGForge.app/Contents/MacOS/dmgforge" --help

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          ${{ matrix.python_bin }} -m unittest discover -s tests -v

      - name: Build app
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"
        run: |
          ${{ matrix.python_bin }} -m PyInstaller ${{ matrix.pyinstaller_args }} --name "${{ matrix.pyinstaller_name }}" --paths src src/cc_decrypter/app.py

      - name: Verify macOS app bundle
        if: startsWith(matrix.os, 'macos')
        run: |
          set -euo pipefail
          app_bundle="dist/CC Decrypter.app"
          built_app_bundle="dist/${{ matrix.pyinstaller_name }}.app"
          if [ "$built_app_bundle" != "$app_bundle" ]; then
            rm -rf "$app_bundle"
            mv "$built_app_bundle" "$app_bundle"
          fi

          info_plist="${app_bundle}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName CC Decrypter" "$info_plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName CC Decrypter" "$info_plist"
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 10.13" "$info_plist" || \
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 10.13" "$info_plist"

          bundle_executable_name="$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$info_plist")"
          bundle_executable="${app_bundle}/Contents/MacOS/${bundle_executable_name}"
          executable_type="$(file "$bundle_executable")"
          echo "$executable_type"
          if ! grep -q "Mach-O" <<< "$executable_type"; then
            echo "CFBundleExecutable must be the native PyInstaller Mach-O binary, not a wrapper script."
            exit 1
          fi

          lipo -archs "$bundle_executable"
          codesign --force --deep --sign - "$app_bundle"
          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          "$bundle_executable" --smoke-test
          plutil -p "$info_plist"

      - name: Create macOS DMG
        if: startsWith(matrix.os, 'macos')
        run: |
          set -euo pipefail
          mkdir -p release
          release_version="${GITHUB_REF_NAME#v}"
          package_dir="${RUNNER_TEMP}/cc-decrypter-dmgforge-${{ matrix.os }}"
          mkdir -p "$package_dir"
          background_image="$package_dir/cc-decrypter-dmg-background.png"
          project_path="$package_dir/${{ matrix.dmg_name }}.dmgproject"

          ${{ matrix.python_bin }} scripts/generate_dmg_background.py "$background_image"
          hdiutil detach "/Volumes/${{ matrix.dmg_volume_name }}" -force || true

          for attempt in 1 2 3; do
            rm -f "$project_path" "release/${{ matrix.dmg_name }}"
            dmgforge init \
              --app "dist/CC Decrypter.app" \
              --name "CC Decrypter" \
              --version "$release_version" \
              --output "$project_path"
            dmgforge copy "$project_path" \
              --title "Install CC Decrypter" \
              --description "Drag CC Decrypter into Applications." \
              --footer "Unsigned local build. Open from Applications after copying."
            dmgforge background "$project_path" --image "$background_image"
            dmgforge arrow "$project_path" --show --color "#111417" --thickness 7

            PROJECT_PATH="$project_path" \
              VOLUME_NAME="${{ matrix.dmg_volume_name }}" \
              DMG_NAME="${{ matrix.dmg_name }}" \
              ${{ matrix.python_bin }} -c 'import json, os; from pathlib import Path; project_path = Path(os.environ["PROJECT_PATH"]); project = json.loads(project_path.read_text(encoding="utf-8")); project["volumeName"] = os.environ["VOLUME_NAME"]; project["outputPath"] = "release/" + os.environ["DMG_NAME"]; project_path.write_text(json.dumps(project, indent=2) + "\n", encoding="utf-8")'

            dmgforge validate "$project_path"

            if dmgforge export "$project_path" --output "release/${{ matrix.dmg_name }}"; then
              break
            fi

            if [ "$attempt" = "3" ]; then
              exit 1
            fi

            sleep 5
            hdiutil detach "/Volumes/${{ matrix.dmg_volume_name }}" -force || true
          done

      - name: Install Inno Setup
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/windows/cc-decrypter.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
