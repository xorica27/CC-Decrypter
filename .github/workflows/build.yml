name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-intel
            runner: macos-15-intel
            python_source: pythonorg
            python_version: "3.10.11"
            python_bin: /Library/Frameworks/Python.framework/Versions/3.10/bin/python3
            artifact_name: CC-Video-Repair-macOS-Intel-dmg
            dmg_volume_name: CC Video Repair Intel
            dmg_name: CC-Video-Repair-macOS-Intel.dmg
            pyinstaller_args: --windowed --target-arch x86_64 --icon assets/CCD.icns --osx-bundle-identifier com.xorica.ccvideorepair
          - os: macos-apple-silicon
            runner: macos-latest
            python_source: setup-python
            python_version: "3.12"
            python_bin: python
            artifact_name: CC-Video-Repair-macOS-Apple-Silicon-dmg
            dmg_volume_name: CC Video Repair Apple Silicon
            dmg_name: CC-Video-Repair-macOS-Apple-Silicon.dmg
            pyinstaller_args: --windowed --target-arch arm64 --icon assets/CCD.icns --osx-bundle-identifier com.xorica.ccvideorepair
          - os: windows
            runner: windows-latest
            python_source: setup-python
            python_version: "3.12"
            python_bin: python
            artifact_name: CC-Video-Repair-Windows-x64-installer
            pyinstaller_args: --windowed --icon assets/CCD.ico

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.python_source == 'setup-python'
        with:
          python-version: ${{ matrix.python_version }}
          cache: "pip"

      - name: Install python.org runtime
        if: matrix.python_source == 'pythonorg'
        run: |
          set -euo pipefail
          curl -L -o "${RUNNER_TEMP}/python-${{ matrix.python_version }}-macos11.pkg" \
            "https://www.python.org/ftp/python/${{ matrix.python_version }}/python-${{ matrix.python_version }}-macos11.pkg"
          sudo installer -pkg "${RUNNER_TEMP}/python-${{ matrix.python_version }}-macos11.pkg" -target /
          "${{ matrix.python_bin }}" --version

      - name: Install dependencies
        run: |
          ${{ matrix.python_bin }} -m pip install --upgrade pip
          ${{ matrix.python_bin }} -m pip install -r requirements.txt

      - name: Run tests
        run: |
          ${{ matrix.python_bin }} -m unittest discover -s tests -v

      - name: Build app
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"
        run: |
          ${{ matrix.python_bin }} -m PyInstaller ${{ matrix.pyinstaller_args }} --name "CC Video Repair" --paths src src/cc_video_repair/app.py

      - name: Verify macOS app bundle
        if: startsWith(matrix.os, 'macos')
        run: |
          set -euo pipefail
          app_bundle="dist/CC Video Repair.app"
          info_plist="${app_bundle}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 10.13" "$info_plist" || \
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 10.13" "$info_plist"

          bundle_executable_name="$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$info_plist")"
          bundle_executable="${app_bundle}/Contents/MacOS/${bundle_executable_name}"
          executable_type="$(file "$bundle_executable")"
          echo "$executable_type"
          if ! grep -q "Mach-O" <<< "$executable_type"; then
            echo "CFBundleExecutable must be the native PyInstaller Mach-O binary, not a wrapper script."
            exit 1
          fi

          lipo -archs "$bundle_executable"
          codesign --force --deep --sign - "$app_bundle"
          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          plutil -p "$info_plist"

      - name: Create macOS DMG
        if: startsWith(matrix.os, 'macos')
        run: |
          set -euo pipefail
          mkdir -p release
          dmg_root="$(mktemp -d "${RUNNER_TEMP:-/tmp}/cc-video-repair-dmg.XXXXXX")"
          cp -R "dist/CC Video Repair.app" "$dmg_root/"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil detach "/Volumes/${{ matrix.dmg_volume_name }}" -force || true
          sync

          for attempt in 1 2 3; do
            if hdiutil create \
              -volname "${{ matrix.dmg_volume_name }}" \
              -srcfolder "$dmg_root" \
              -ov \
              -format UDZO \
              "release/${{ matrix.dmg_name }}"; then
              break
            fi

            if [ "$attempt" = "3" ]; then
              exit 1
            fi

            sleep 5
            hdiutil detach "/Volumes/${{ matrix.dmg_volume_name }}" -force || true
          done

      - name: Install Inno Setup
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/windows/cc-video-repair.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
