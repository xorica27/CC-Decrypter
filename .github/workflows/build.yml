name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
            artifact_name: CC-Video-Repair-macOS-universal2-dmg
            pyinstaller_args: --windowed --target-arch universal2
          - os: windows
            runner: windows-latest
            artifact_name: CC-Video-Repair-Windows-x64-installer
            pyinstaller_args: --windowed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} --name "CC Video Repair" --paths src src/cc_video_repair/app.py

      - name: Create macOS DMG
        if: matrix.os == 'macos'
        run: |
          mkdir -p release
          hdiutil create \
            -volname "CC Video Repair" \
            -srcfolder "dist/CC Video Repair.app" \
            -ov \
            -format UDZO \
            "release/CC-Video-Repair-macOS-universal2.dmg"

      - name: Install Inno Setup
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/windows/cc-video-repair.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
